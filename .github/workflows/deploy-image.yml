name: Build & Deploy Image

# Builds the production Docker image on a GitHub runner (plenty of RAM, so the
# Next.js "Collecting page data" phase can't OOM the way it does on the small
# Coolify build host), pushes it to GHCR, then triggers Coolify to pull & run it.
#
# Coolify must be reconfigured to deploy this prebuilt image instead of building
# from source via Nixpacks. See the deployment docs / the assistant's notes:
#   1. Make the GHCR package readable by Coolify (public, or add GHCR creds).
#   2. Point the Coolify resource at ghcr.io/akweb1024/ims2:latest (Docker Image).
#   3. Add repo secrets COOLIFY_WEBHOOK_URL (+ COOLIFY_TOKEN) for auto-deploy.

# Gated on CI: this runs only after the "CI/CD Pipeline" workflow completes on main.
# The job below then refuses to ship unless that run's conclusion was success, so a
# failing lint/type-check/build/test blocks the production image + Coolify deploy.
# (Previously this triggered directly on push and shipped in parallel with CI, so a
# red test suite could not stop a deploy.) workflow_dispatch stays for manual deploys.
on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/akweb1024/ims2

jobs:
  build-push-deploy:
    name: Build, push to GHCR, trigger Coolify
    runs-on: ubuntu-latest
    # Deploy only when triggered manually, or when the CI run that triggered us was a
    # push to main that succeeded. A failed/cancelled CI run fires workflow_run too, so
    # this guard is what actually enforces the gate — the job is skipped otherwise.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    permissions:
      contents: read
      packages: write
    env:
      COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_run events the default checkout ref is the branch tip, which can
          # drift ahead of the commit CI actually validated. Pin to the exact SHA CI ran
          # on so we ship precisely what passed. Falls back to the ref for manual dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha || github.sha }}
          # Registry-backed build cache lives in GHCR, not the 10 GB per-repo
          # Actions cache — so mode=max layer reuse no longer overflows that cap.
          # The single :buildcache tag is overwritten each run (no accumulation).
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Trigger Coolify deploy
        if: ${{ env.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          echo "Triggering Coolify deploy webhook..."
          curl --fail-with-body --silent --show-error -X GET "$COOLIFY_WEBHOOK_URL" \
            ${COOLIFY_TOKEN:+-H "Authorization: Bearer $COOLIFY_TOKEN"}

      - name: Webhook not configured
        if: ${{ env.COOLIFY_WEBHOOK_URL == '' }}
        run: |
          echo "::notice::Image pushed to ${IMAGE}:latest and ${IMAGE}:${GITHUB_SHA}."
          echo "::notice::COOLIFY_WEBHOOK_URL secret not set — skipping auto-deploy. Configure it to enable automatic Coolify redeploys."
