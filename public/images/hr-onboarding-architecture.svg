<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HR Hiring and Onboarding Architecture</title>
  <desc id="desc">A four-stage flowchart showing recruitment handoff, employee portal, workflow state, and onboarding content feeding compliance and readiness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="softEmerald" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D1FAE5"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="softAmber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="softPurple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EDE9FE"/>
      <stop offset="1" stop-color="#DDD6FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#1E3A8A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <style>
      .label { font: 700 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .small { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .micro { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0.08em; text-transform: uppercase; }
      .nodeStroke { stroke: rgba(37, 99, 235, 0.15); stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1420" cy="120" r="140" fill="#DBEAFE" fill-opacity="0.55"/>
  <circle cx="180" cy="760" r="180" fill="#DDD6FE" fill-opacity="0.28"/>
  <circle cx="1260" cy="760" r="220" fill="#A7F3D0" fill-opacity="0.20"/>

  <text x="90" y="88" class="micro">HR Hiring and Onboarding Architecture</text>
  <text x="90" y="132" class="label" font-size="36">Candidate to employee, then workflow to readiness</text>
  <text x="90" y="168" class="small">Recruitment provisions the employee, the portal tracks progress, HR owns the workflow state, and onboarding content feeds compliance.</text>

  <!-- Stage 1 -->
  <g filter="url(#shadow)">
    <rect x="90" y="240" rx="28" ry="28" width="310" height="280" fill="url(#node)" class="nodeStroke"/>
    <rect x="118" y="268" rx="16" ry="16" width="110" height="38" fill="url(#softBlue)"/>
    <text x="133" y="293" class="micro" fill="#1D4ED8">1. Recruitment</text>
    <text x="118" y="346" class="label" font-size="28">Recruitment Board</text>
    <text x="118" y="386" class="small">Candidate reaches SELECTED state.</text>
    <text x="118" y="418" class="small">HR clicks Onboard to start the handoff.</text>
    <text x="118" y="450" class="small">System creates the user and employee profile.</text>
    <text x="118" y="482" class="small">A one-time invite token and offer letter are generated.</text>
  </g>

  <!-- Stage 2 -->
  <g filter="url(#shadow)">
    <rect x="450" y="240" rx="28" ry="28" width="310" height="280" fill="url(#node)" class="nodeStroke"/>
    <rect x="478" y="268" rx="16" ry="16" width="122" height="38" fill="url(#softEmerald)"/>
    <text x="493" y="293" class="micro" fill="#047857">2. Employee</text>
    <text x="478" y="346" class="label" font-size="28">Staff Portal</text>
    <text x="478" y="386" class="small">Employee accepts invite and sets password.</text>
    <text x="478" y="418" class="small">Portal loads onboarding progress.</text>
    <text x="478" y="450" class="small">Compliance checks only applicable modules.</text>
    <text x="478" y="482" class="small">Completion status updates in the portal.</text>
  </g>

  <!-- Stage 3 -->
  <g filter="url(#shadow)">
    <rect x="810" y="240" rx="28" ry="28" width="310" height="280" fill="url(#node)" class="nodeStroke"/>
    <rect x="838" y="268" rx="16" ry="16" width="170" height="38" fill="url(#softAmber)"/>
    <text x="853" y="293" class="micro" fill="#B45309">3. HR Workflow</text>
    <text x="838" y="346" class="label" font-size="28">Workflow State</text>
    <text x="838" y="386" class="small">HR opens the workflow-state editor.</text>
    <text x="838" y="418" class="small">Joining, verification, job, and perks are saved.</text>
    <text x="838" y="450" class="small">Approvals and rejections are captured.</text>
    <text x="838" y="482" class="small">Audit log preserves every change.</text>
  </g>

  <!-- Stage 4 -->
  <g filter="url(#shadow)">
    <rect x="1170" y="240" rx="28" ry="28" width="340" height="280" fill="url(#node)" class="nodeStroke"/>
    <rect x="1198" y="268" rx="16" ry="16" width="178" height="38" fill="url(#softPurple)"/>
    <text x="1213" y="293" class="micro" fill="#6D28D9">4. Content Library</text>
    <text x="1198" y="346" class="label" font-size="28">Onboarding Manager</text>
    <text x="1198" y="386" class="small">Reusable modules and questions are managed here.</text>
    <text x="1198" y="418" class="small">Module applicability drives progress and readiness.</text>
    <text x="1198" y="450" class="small">Progress records feed completion metrics.</text>
    <text x="1198" y="482" class="small">The library remains company-aware and reusable.</text>
  </g>

  <!-- Bottom band -->
  <g filter="url(#shadow)">
    <rect x="90" y="586" rx="28" ry="28" width="1420" height="220" fill="#FFFFFF" class="nodeStroke"/>
    <rect x="118" y="616" rx="20" ry="20" width="270" height="160" fill="#EFF6FF"/>
    <text x="140" y="650" class="micro" fill="#2563EB">Source of truth</text>
    <text x="140" y="690" class="label" font-size="26">employeeProfile.metrics.onboardingWorkflow</text>
    <text x="140" y="724" class="small">Stores step status, detail payloads, approvals, and timestamps.</text>
    <text x="140" y="752" class="small">This is the persisted workflow state used by the HR workflow UI.</text>

    <rect x="430" y="616" rx="20" ry="20" width="300" height="160" fill="#ECFDF5"/>
    <text x="452" y="650" class="micro" fill="#059669">Progress layer</text>
    <text x="452" y="690" class="label" font-size="26">OnboardingProgress</text>
    <text x="452" y="724" class="small">Module completion, scores, and readiness tracking.</text>
    <text x="452" y="752" class="small">The portal reads this alongside compliance checks.</text>

    <rect x="770" y="616" rx="20" ry="20" width="320" height="160" fill="#FFFBEB"/>
    <text x="792" y="650" class="micro" fill="#D97706">Invite + document layer</text>
    <text x="792" y="690" class="label" font-size="26">Reset token + offer letter</text>
    <text x="792" y="724" class="small">One-time password reset invite starts the journey safely.</text>
    <text x="792" y="752" class="small">Offer letter stays attached to the hiring handoff.</text>

    <rect x="1120" y="616" rx="20" ry="20" width="360" height="160" fill="#F5F3FF"/>
    <text x="1142" y="650" class="micro" fill="#7C3AED">Outcome</text>
    <text x="1142" y="690" class="label" font-size="26">Compliance + readiness</text>
    <text x="1142" y="724" class="small">Employee completes the required modules and workflow steps.</text>
    <text x="1142" y="752" class="small">HR can approve, monitor, and export the handoff state.</text>
  </g>

  <!-- Connectors -->
  <path d="M 400 380 C 430 380, 425 380, 450 380" stroke="#2563EB" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 760 380 C 790 380, 785 380, 810 380" stroke="#2563EB" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1120 380 C 1150 380, 1145 380, 1170 380" stroke="#2563EB" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <path d="M 245 520 C 245 560, 245 574, 245 586" stroke="#94A3B8" stroke-width="4" stroke-dasharray="10 10" fill="none"/>
  <path d="M 605 520 C 605 560, 605 574, 605 586" stroke="#94A3B8" stroke-width="4" stroke-dasharray="10 10" fill="none"/>
  <path d="M 965 520 C 965 560, 965 574, 965 586" stroke="#94A3B8" stroke-width="4" stroke-dasharray="10 10" fill="none"/>
  <path d="M 1340 520 C 1340 560, 1340 574, 1340 586" stroke="#94A3B8" stroke-width="4" stroke-dasharray="10 10" fill="none"/>

  <text x="435" y="548" class="small" fill="#64748B">Invite</text>
  <text x="792" y="548" class="small" fill="#64748B">Progress</text>
  <text x="1142" y="548" class="small" fill="#64748B">Audit</text>
</svg>
